{% extends "base.html" %}
{% block title %}Админ — Галерея{% endblock %}

{% block content %}
<section class="st-wrap">
  <div class="st-card">
    <div class="st-head">
      <h2>Галерея</h2>
      <p class="muted">Здесь можно добавлять, редактировать и удалять фото для страницы “О нас”.</p>
    </div>

    <form class="st-form" method="post" action="/admin/gallery/upload" enctype="multipart/form-data" style="margin-top:14px;">
      <label>Фото</label>
      <input type="file" name="photo" accept="image/*" required>

      <label style="margin-top:10px;">Подпись (необязательно)</label>
      <input name="title" placeholder="Напр: Автодром, уроки, филиал">

      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;">
        <div style="flex:1;min-width:180px;">
          <label>Порядок (sort_order)</label>
          <input name="sort_order" type="number" value="0">
        </div>

        <label style="display:flex;align-items:center;gap:8px;margin-top:26px;">
          <input type="checkbox" name="is_active" checked>
          Показать на сайте
        </label>
      </div>

      <button class="btn primary" type="submit" style="margin-top:12px;">Добавить</button>
    </form>

    <hr style="margin:18px 0;opacity:.25;">

    <div class="g-admin-grid">
      {% for it in items %}
      <div class="g-admin-item">
        <div class="g-admin-thumb">
          <img src="{{ media_url(it.photo_url) }}">
        </div>

        <form method="post" action="/admin/gallery/{{ it.id }}/update" enctype="multipart/form-data" class="g-admin-form">
          <div class="muted">ID: <b>#{{ it.id }}</b></div>

          <label style="margin-top:8px;">Подпись</label>
          <input name="title" value="{{ it.title or '' }}">

          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;">
            <div style="flex:1;min-width:160px;">
              <label>Порядок</label>
              <input name="sort_order" type="number" value="{{ it.sort_order }}">
            </div>

            <label style="display:flex;align-items:center;gap:8px;margin-top:26px;">
              <input type="checkbox" name="is_active" {% if it.is_active %}checked{% endif %}>
              Активно
            </label>
          </div>

          <label style="margin-top:10px;">Заменить фото (необязательно)</label>
          <input type="file" name="photo" accept="image/*">

          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">
            <button class="btn primary" type="submit">Сохранить</button>
          </div>
        </form>

        <form method="post" action="/admin/gallery/{{ it.id }}/delete" onsubmit="return confirm('Удалить фото?')">
          <button class="btn btn-outline" type="submit">Удалить</button>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<style>
  .g-admin-grid{
    display:grid;
    grid-template-columns: repeat(2, minmax(0,1fr));
    gap:14px;
    margin-top:8px;
  }
  .g-admin-item{
    padding:12px;
    border:1px solid rgba(255,255,255,.12);
    border-radius:14px;
    background: rgba(0,0,0,.08);
    display:grid;
    grid-template-columns: 140px 1fr;
    gap:12px;
    align-items:start;
  }
  .g-admin-thumb{
    width:140px;height:110px;border-radius:12px;overflow:hidden;background:#111;
  }
  .g-admin-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .g-admin-form input[type="text"], .g-admin-form input[type="number"], .g-admin-form input:not([type]){
    width:100%;
  }
  @media (max-width: 920px){
    .g-admin-grid{grid-template-columns:1fr;}
    .g-admin-item{grid-template-columns: 120px 1fr;}
    .g-admin-thumb{width:120px;height:96px;}
  }
</style>
{% endblock %}
