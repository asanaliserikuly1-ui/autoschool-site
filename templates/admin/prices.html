{% extends "base.html" %}
{% block title %}Админ — Цены{% endblock %}

{% block content %}
<section class="section section-min">
  <div class="section-head-min">
    <h2>Цены</h2>
    <p class="muted">Меняй карточки цен на сайте без редактирования кода.</p>
  </div>

  <div class="admin-grid">
    <div class="admin-card">
      <div class="admin-card-title">Добавить цену</div>
      <form method="post" action="/admin/prices/create" class="form">
        <label>Название</label>
        <input name="title" required placeholder="Категория B">

        <label>Подзаголовок (не обязательно)</label>
        <input name="subtitle" placeholder="популярно">

        <label>Цена</label>
        <input name="price_text" required placeholder="от 150 000 ₸">

        <label class="check">
          <input type="checkbox" name="is_highlight">
          <span>Выделить карточку</span>
        </label>

        <button class="btn btn-primary" style="width:100%;" type="submit">
          <i data-lucide="plus" class="i"></i><span>Добавить</span>
        </button>
      </form>
    </div>

    <div class="admin-card">
      <div class="admin-card-title">Список цен</div>

      {% for p in prices %}
      <div class="admin-item">
        <form method="post" action="/admin/prices/{{ p.id }}/update" class="form compact">
          <label>Название</label>
          <input name="title" value="{{ p.title }}" required>

          <label>Подзаголовок</label>
          <input name="subtitle" value="{{ p.subtitle or '' }}">

          <label>Цена</label>
          <input name="price_text" value="{{ p.price_text }}" required>

          <label class="check">
            <input type="checkbox" name="is_highlight" {% if p.is_highlight %}checked{% endif %}>
            <span>Выделить карточку</span>
          </label>

          <div class="row-actions">
            <button class="btn btn-primary" type="submit">
              <i data-lucide="save" class="i"></i><span>Сохранить</span>
            </button>
        </form>

            <form method="post" action="/admin/prices/{{ p.id }}/delete" onsubmit="return confirm('Удалить цену?')">
              <button class="btn btn-outline" type="submit">
                <i data-lucide="trash" class="i"></i><span>Удалить</span>
              </button>
            </form>
          </div>
      </div>
      {% endfor %}

    </div>
  </div>
</section>

<script> if (window.lucide) lucide.createIcons(); </script>
{% endblock %}
