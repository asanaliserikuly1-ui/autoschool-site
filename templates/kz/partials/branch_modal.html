<div class="modal-backdrop" data-branch-modal>
  <div class="modal modal-branches" role="dialog" aria-modal="true" aria-label="Филиалды таңдау">
    <!-- Header -->
    <div class="modal-header">
      <div class="modal-title">
        <div class="modal-kicker">
          <span class="pill"><i data-lucide="building-2" class="i"></i> 5 филиал</span>
          <span class="dot"></span>
          <span class="muted">1 минутта жазылу</span>
        </div>

        <h3>Филиалды таңдаңыз</h3>

        <div class="modal-tabs" role="tablist" aria-label="Режим">
          <button class="modal-tab is-active" type="button" data-tab="list">Филиалдар</button>
          <button class="modal-tab" type="button" data-tab="map">Карта</button>
        </div>
      </div>

      <button class="modal-close" data-close-branches aria-label="Жабу">
        <i data-lucide="x" class="i"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <div class="choice-bar" id="choiceBar" style="display:none;">
        <div class="choice-pill">
          <i data-lucide="sparkles" class="i"></i>
          <span id="choiceText">—</span>
        </div>
        <button class="choice-clear" type="button" id="choiceClear" aria-label="Тазалау">
          <i data-lucide="x" class="i"></i>
        </button>
      </div>

      <!-- Left -->
      <div class="branches-left">
        <div class="branches-toolbar">
          <div class="search">
            <i data-lucide="search" class="i"></i>
            <input type="text" id="branchSearch" placeholder="Атауы / мекенжай бойынша іздеу..." autocomplete="off">
          </div>

          <button class="btn btn-soft" type="button" id="showAllBtn">
            <i data-lucide="list" class="i"></i>
            <span>Барлығы</span>
          </button>
        </div>

        <div class="branches-list" id="branchesList"></div>

        <div class="branches-hint">
          <i data-lucide="info" class="i"></i>
          <span>Карточканы басыңыз — карта жаңарады.</span>
        </div>
      </div>

      <!-- Right -->
      <div class="branch-right">
        <div class="map-branch-switch" id="mapBranchSwitch" aria-label="Картаға арналған филиалдар"></div>

        <div class="map-card">
          <div class="map-top">
            <div>
              <div class="map-title" id="branchName">—</div>
              <div class="map-sub" id="branchAddr">—</div>
            </div>
            <div class="map-actions" id="branchQuickActions">
              <!-- JS -->
            </div>
          </div>

          <div class="map-frame">
            <iframe
              id="branchMap"
              src=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
